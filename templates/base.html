<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-IDS - Artificial Intelligence Intrusion Detection System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts: Space Grotesk & Rajdhani -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0b132b;
            --secondary-bg: #1c2541;
            --accent-cyan: #00ffcc;
            --accent-pink: #ff3366;
            --accent-yellow: #ffc107;
            --accent-green: #20c997;
            --text-main: #f8f9fa;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, h5, h6, .font-family-orbitron {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
        }

        .navbar-custom {
            background-color: var(--primary-bg);
            border-bottom: 2px solid rgba(0, 255, 204, 0.1);
        }

        .navbar-brand {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            color: var(--text-main) !important;
            letter-spacing: 1.5px;
            font-size: 1.6rem;
            text-transform: uppercase;
        }

        .navbar-brand span {
            color: var(--accent-cyan);
        }

        .nav-link {
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8) !important;
            transition: color 0.3s ease;
            margin-left: 15px;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-cyan) !important;
        }

        .hero-section {
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            color: var(--text-main);
            padding: 80px 0;
            position: relative;
            overflow: hidden;
        }

        .hero-section::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/dark-mosaic.png');
            opacity: 0.2;
            pointer-events: none;
        }

        .hero-title {
            font-size: 3.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer {
            background-color: var(--primary-bg);
            color: rgba(255, 255, 255, 0.6);
            padding: 20px 0;
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }

        /* Card custom styles */
        .feature-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: #fff;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        .feature-icon-wrapper {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        /* Attack Badges styling */
        .attack-badge-card {
            border: none;
            border-radius: 10px;
            color: #fff;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease;
        }

        .attack-badge-card:hover {
            transform: scale(1.05);
        }

        .bg-dos { background-color: var(--accent-pink); }
        .bg-probe { background-color: var(--accent-yellow); color: #212529; }
        .bg-r2l { background-color: #0dcaf0; color: #212529; }
        .bg-u2r { background-color: #212529; }
        .bg-normal { background-color: var(--accent-green); }
    </style>
</head>
<body>

    <!-- Header Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-fill-check me-2 text-cyan"></i>AI-<span>IDS</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'predict' %}active{% endif %}" href="/predict">Predict</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'alerts' %}active{% endif %}" href="/alerts">Alerts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'about' %}active{% endif %}" href="/about">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer text-center">
        <div class="container">
            <span>&copy; 2026 AI-Enhanced Intrusion Detection System. All Rights Reserved.</span>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
